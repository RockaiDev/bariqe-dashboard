name: Bariqe Backend CI/CD

on:
  push:
    branches: ["Dev"]
    paths:
      - 'bariqe-dashboard/backend/**' 
  workflow_dispatch: 

env:
  SERVICE_NAME: bariqe-backend
  WORKING_DIR: ./bariqe-dashboard/backend

jobs:
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarqube:
    name: Code Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ env.WORKING_DIR }}
          args: >
            -Dsonar.projectKey=bariqe-backend
            -Dsonar.organization=beshoyrockaidev-maker
            -Dsonar.branch.name=master

  dependency-check:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --package-lock-only 
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ env.SERVICE_NAME }}
          path: ${{ env.WORKING_DIR }}
          format: 'HTML' 
          out: 'dependency-reports'
          args: '--failOnCVSS 11'
      
      - name: Upload Report for Developers
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: security-vulnerability-report
          path: dependency-reports/

  build-and-push:
    runs-on: ubuntu-latest
    needs: [gitleaks, sonarqube, dependency-check]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.WORKING_DIR }}
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report.txt' # كدة هيسيف النتيجة في ملف نصي

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-security-report
          path: trivy-report.txt

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.SERVICE_NAME }} --all-tags